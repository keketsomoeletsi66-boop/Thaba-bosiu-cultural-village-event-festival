<html>
<title>Festival Tickets</title>

</head>
<body>
<h1>Festival Tickets</h1>
<nav>
<a href="index.html">Home</a>
<a href="about.html">About</a>
<a href="tickets.html">Tickets</a>
</nav>
<h2>Ticket Prices</h2>

<div class="grid">

<div class="card">
<h3>General Admission</h3>
<p>M100</p>
</div>

<div class="card">
<h3>Student Ticket</h3>
<p>M70</p>
</div>

<div class="card">
<h3>VIP Experience</h3>
<p>M250</p>
</div>

</div>

<h2>Book Your Ticket</h2>

<form>
<label for="name">Full Name</label>
<input type="text" id="name" required>

<label for="email">Email</label>
<input type="email" id="email" required>

<label for="ticket">Ticket Type</label>
<select id="ticket">
<option>General Admission</option>
<option>Student Ticket</option>
<option>VIP Experience</option>
</select>

<button type="submit">Reserve Ticket</button>
</form>

</main>

<footer>
<p>Contact festival organizers for assistance.</p>
</footer>

</body>
</html>
